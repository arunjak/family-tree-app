version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: family-tree-db
    environment:
      POSTGRES_DB: familytree
      POSTGRES_USER: familytree_user
      POSTGRES_PASSWORD: familytree_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familytree_user -d familytree"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: family-tree-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/familytree
      SPRING_DATASOURCE_USERNAME: familytree_user
      SPRING_DATASOURCE_PASSWORD: familytree_pass
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret-key-in-production-min-32-chars}
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: family-tree-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  uploads-data:
