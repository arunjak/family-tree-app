spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/familytree
    username: familytree_user
    password: familytree_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: change-this-super-secret-key-in-production-min-32-chars
  expiration-ms: 86400000   # 24 hours

file:
  upload-dir: ./uploads/photos

logging:
  level:
    com.familytree: DEBUG
    org.springframework.security: INFO
