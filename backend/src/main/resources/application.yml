# ─────────────────────────────────────────────────────────────────────────────
# Production config — all secrets come from environment variables
# Local dev overrides this via application-dev.yml (H2 in-memory DB)
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cloudinary:
  url: ${CLOUDINARY_URL}

# ── Admin-only mode ───────────────────────────────────────────────────────────
# Set ADMIN_ONLY_MODE=true to lock down the app:
#   - No new registrations allowed
#   - Only the email in ADMIN_EMAIL can log in
app:
  admin-only-mode: ${ADMIN_ONLY_MODE:false}
  admin-email: ${ADMIN_EMAIL:}

# Comma-separated list of allowed frontend origins for CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.familytree: INFO
    org.springframework.security: INFO
