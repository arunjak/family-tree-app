# =========================================================
# LOCAL DEV PROFILE  —  No Docker, no PostgreSQL needed!
# Run with:  ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# =========================================================

spring:
  datasource:
    url: jdbc:h2:mem:familytreedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # H2 web console → http://localhost:8080/api/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

# Dev overrides for secrets — set CLOUDINARY_URL + JWT_SECRET in your shell
# or create a local .env file and export them before running.
jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-min-32-chars-abc}
  expiration-ms: 86400000

# CLOUDINARY_URL must be set even in dev if you want to test photo uploads.
# Get it free from cloudinary.com → Dashboard → copy "API Environment variable"
# export CLOUDINARY_URL=cloudinary://key:secret@cloud_name
cloudinary:
  url: ${CLOUDINARY_URL:cloudinary://placeholder:placeholder@placeholder}

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.familytree: DEBUG
